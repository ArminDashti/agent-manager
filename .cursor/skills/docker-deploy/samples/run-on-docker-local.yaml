# Sample local deploy settings — copy to .deploy/docker/ and adapt.
# Scripts read this file only (no CLI -- flags).

stack_name: myapp
image_tag: myapp:latest
compose_file: docker-compose.yml
docker_network: myapp-net
# Host publish port; use "" when behind a reverse proxy
api_publish_port: "30080"
delete_volume: "no"
delete_image: "no"
